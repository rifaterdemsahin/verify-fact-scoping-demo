<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, Segoe UI, sans-serif" role="img" aria-label="UML sequence diagram">
  <defs>
    <marker id="arrS" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1000" height="720" fill="#0a0f1f"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="800" fill="#f8fafc">🧭 UML Sequence Diagram — Runtime Flow</text>

  <!-- Column headers -->
  <g font-size="13" font-weight="700">
    <text x="120" y="74" text-anchor="middle" fill="#fca5a5">Coordinator</text>
    <text x="120" y="90" text-anchor="middle" fill="#94a3b8" font-size="11">(shared)</text>
    <text x="300" y="74" text-anchor="middle" fill="#fca5a5">Synthesis Agent</text>
    <text x="300" y="90" text-anchor="middle" fill="#94a3b8" font-size="11">(naive / resilient)</text>
    <text x="480" y="74" text-anchor="middle" fill="#6ee7b7">verify_fact tool</text>
    <text x="660" y="74" text-anchor="middle" fill="#c7d2fe">Web Search Agent</text>
    <text x="860" y="74" text-anchor="middle" fill="#7dd3fc">Local Fact DB</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5">
    <line x1="120" y1="104" x2="120" y2="690"/>
    <line x1="300" y1="104" x2="300" y2="690"/>
    <line x1="480" y1="104" x2="480" y2="690"/>
    <line x1="660" y1="104" x2="660" y2="690"/>
    <line x1="860" y1="104" x2="860" y2="690"/>
  </g>

  <!-- NAIVE section -->
  <rect x="40" y="108" width="940" height="250" fill="#1a0f12" opacity="0.35" rx="6"/>
  <text x="60" y="128" font-size="14" font-weight="800" fill="#fca5a5">❌ NAIVE — every trivial check becomes a round trip</text>

  <path d="M120,150 L300,150" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)"/>
  <text x="170" y="144" font-size="11" fill="#fecaca">synthesize(task)</text>

  <path d="M300,176 L120,176" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)" stroke-dasharray="5 3"/>
  <text x="150" y="170" font-size="11" fill="#fecaca">needs_verification(claim1)</text>

  <path d="M120,202 L660,202" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)"/>
  <text x="330" y="196" font-size="11" fill="#fecaca">search(claim1.subject)  ← heavyweight even for a date</text>

  <path d="M660,228 L120,228" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)" stroke-dasharray="5 3"/>
  <text x="330" y="222" font-size="11" fill="#fecaca">result</text>

  <path d="M120,254 L300,254" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)"/>
  <text x="150" y="248" font-size="11" fill="#fecaca">re-invoke synthesis (context replay = 1200 tok)</text>

  <path d="M300,282 L120,282" stroke="#f87171" stroke-width="2" marker-end="url(#arrS)" stroke-dasharray="5 3"/>
  <text x="150" y="276" font-size="11" fill="#fecaca">needs_verification(claim2) … repeat per claim</text>

  <text x="60" y="324" font-size="12" fill="#f87171" font-weight="700">→ 25 interventions · 53 500 input tokens · 21.5 s</text>
  <text x="60" y="344" font-size="11" fill="#94a3b8">no local capability exists, so the loop is unavoidable</text>

  <!-- RESILIENT section -->
  <rect x="40" y="372" width="940" height="300" fill="#0b1f17" opacity="0.4" rx="6"/>
  <text x="60" y="392" font-size="14" font-weight="800" fill="#6ee7b7">✅ RESILIENT — scoped verify_fact handles the 85% in-tool</text>

  <path d="M120,416 L300,416" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="170" y="410" font-size="11" fill="#a7f3d0">synthesize(task)</text>

  <!-- simple claim loop local -->
  <path d="M300,444 L480,444" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="320" y="438" font-size="11" fill="#a7f3d0">verify_fact(simple) ×21</text>
  <path d="M480,462 L860,462" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="600" y="456" font-size="11" fill="#a7f3d0">lookup(subject)</text>
  <path d="M860,480 L480,480" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)" stroke-dasharray="5 3"/>
  <text x="600" y="474" font-size="11" fill="#a7f3d0">{value, confidence}</text>
  <path d="M480,498 L300,498" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)" stroke-dasharray="5 3"/>
  <text x="330" y="492" font-size="11" fill="#a7f3d0">OK → resolved locally, NO round trip</text>

  <!-- complex escalation only -->
  <path d="M300,528 L120,528" stroke="#facc15" stroke-width="2" marker-end="url(#arrS)" stroke-dasharray="5 3"/>
  <text x="150" y="522" font-size="11" fill="#fde68a">needs_verification(complex) ×4 only</text>

  <path d="M120,556 L660,556" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="330" y="550" font-size="11" fill="#a7f3d0">search(complex.subject) — justified, deep dive</text>
  <path d="M660,582 L120,582" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)" stroke-dasharray="5 3"/>
  <text x="330" y="576" font-size="11" fill="#a7f3d0">result</text>

  <path d="M120,610 L300,610" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="150" y="604" font-size="11" fill="#a7f3d0">re-invoke (1 hand-off / task)</text>
  <path d="M300,636 L120,636" stroke="#34d399" stroke-width="2" marker-end="url(#arrG)" stroke-dasharray="5 3"/>
  <text x="160" y="630" font-size="11" fill="#a7f3d0">completed ✅</text>

  <text x="60" y="664" font-size="12" fill="#6ee7b7" font-weight="700">→ 4 interventions · 15 070 input tokens · 5.1 s · 100% reliable</text>
</svg>
