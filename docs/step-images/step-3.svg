<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Inter, Segoe UI, sans-serif" role="img" aria-label="Step 3 — web simulator architecture">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1530"/><stop offset="1" stop-color="#160f2e"/>
    </linearGradient>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="960" height="600" fill="url(#bg3)"/>
  <text x="480" y="46" text-anchor="middle" font-size="26" font-weight="800" fill="#f8fafc">🖥️ STEP 3 · Interactive Web Simulator</text>
  <text x="480" y="74" text-anchor="middle" font-size="15" fill="#94a3b8">Pico.css + htmx · real-time metrics · animated trace replay</text>

  <!-- Browser frame -->
  <rect x="40" y="104" width="880" height="430" rx="16" fill="#0a0f1f" stroke="#475569" stroke-width="2"/>
  <rect x="40" y="104" width="880" height="34" rx="16" fill="#1e293b"/>
  <circle cx="64" cy="121" r="6" fill="#ef4444"/><circle cx="84" cy="121" r="6" fill="#f59e0b"/><circle cx="104" cy="121" r="6" fill="#22c55e"/>
  <text x="480" y="126" text-anchor="middle" font-size="12" fill="#cbd5e1">index.html — glassmorphic dark UI</text>

  <!-- Toolbar: controls -->
  <g font-size="12">
    <rect x="60" y="156" width="120" height="34" rx="8" fill="#312e81" stroke="#818cf8"/>
    <text x="120" y="177" text-anchor="middle" fill="#e0e7ff">▶ Play / ⏸ Pause</text>
    <rect x="188" y="156" width="90" height="34" rx="8" fill="#1e293b" stroke="#64748b"/>
    <text x="233" y="177" text-anchor="middle" fill="#e2e8f0">⏭ Step</text>
    <rect x="286" y="156" width="90" height="34" rx="8" fill="#1e293b" stroke="#64748b"/>
    <text x="331" y="177" text-anchor="middle" fill="#e2e8f0">↺ Reset</text>
    <rect x="384" y="156" width="250" height="34" rx="8" fill="#0c2a23" stroke="#34d399"/>
    <text x="509" y="177" text-anchor="middle" fill="#a7f3d0">🔊 Read Walkthrough &amp; Follow</text>
    <rect x="644" y="156" width="256" height="34" rx="8" fill="#1e1b4b" stroke="#a78bfa"/>
    <text x="772" y="177" text-anchor="middle" fill="#ddd6fe">htmx tabs: naive · resilient · both</text>
  </g>

  <!-- Metric cards -->
  <g font-size="12">
    <rect x="60" y="210" width="200" height="86" rx="12" fill="#1a0f12" stroke="#f87171"/>
    <text x="160" y="232" text-anchor="middle" fill="#fca5a5">Coordinator Interventions</text>
    <text x="160" y="270" text-anchor="middle" font-size="26" font-weight="800" fill="#fff">25 → 4</text>
    <text x="160" y="288" text-anchor="middle" fill="#86efac">−84%</text>

    <rect x="280" y="210" width="200" height="86" rx="12" fill="#1a0f12" stroke="#f87171"/>
    <text x="380" y="232" text-anchor="middle" fill="#fca5a5">Input Tokens</text>
    <text x="380" y="270" text-anchor="middle" font-size="26" font-weight="800" fill="#fff">53 500 → 15 070</text>
    <text x="380" y="288" text-anchor="middle" fill="#86efac">−71.8%</text>

    <rect x="500" y="210" width="200" height="86" rx="12" fill="#1a0f12" stroke="#f87171"/>
    <text x="600" y="232" text-anchor="middle" fill="#fca5a5">Latency</text>
    <text x="600" y="270" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">21.5s → 5.1s</text>
    <text x="600" y="288" text-anchor="middle" fill="#86efac">−76.4%</text>

    <rect x="720" y="210" width="180" height="86" rx="12" fill="#0b1f17" stroke="#34d399"/>
    <text x="810" y="232" text-anchor="middle" fill="#6ee7b7">Reliability</text>
    <text x="810" y="270" text-anchor="middle" font-size="26" font-weight="800" fill="#fff">100% ✅</text>
    <text x="810" y="288" text-anchor="middle" fill="#a7f3d0">held steady</text>
  </g>

  <!-- Event log -->
  <rect x="60" y="316" width="840" height="150" rx="12" fill="#060b16" stroke="#334155"/>
  <text x="80" y="340" font-size="13" fill="#7dd3fc" font-weight="700">📡 Live Event Log (trace replay)</text>
  <g font-family="ui-monospace, monospace" font-size="11.5" fill="#cbd5e1">
    <text x="80" y="364">▶ task_start   🎯 Coordinator dispatched "History of the Transistor" (5 claims)</text>
    <text x="80" y="384">  tool_call    🔍 verify_fact(inventor:transistor) — local bounded lookup</text>
    <text x="80" y="404">  local_recov  ✅ Local verified "inventor:transistor" → Bell Labs</text>
    <text x="80" y="424">  escalate     ↗️ Delegating complex claim "…semiconductor ecosystem…" to coordinator</text>
    <text x="80" y="444">  handoff      🔀 Coordinator hand-off → web search agent …</text>
  </g>

  <text x="480" y="556" text-anchor="middle" font-size="13" fill="#a78bfa">Audio narrator auto-scrolls &amp; highlights each section as it reads 🔊</text>
  <text x="480" y="500" text-anchor="middle" font-size="12" fill="#94a3b8">Every diagram is click-to-zoom in a fullscreen lightbox 🔍</text>
</svg>
