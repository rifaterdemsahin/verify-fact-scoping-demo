<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Inter, Segoe UI, sans-serif" role="img" aria-label="Step 0 — the verification bottleneck">
  <defs>
    <linearGradient id="bg0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1830"/><stop offset="1" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="redg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b1d22"/><stop offset="1" stop-color="#2a1418"/>
    </linearGradient>
    <marker id="ar-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/>
    </marker>
    <filter id="glow0"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg0)"/>
  <text x="480" y="48" text-anchor="middle" font-size="26" font-weight="800" fill="#f8fafc">🔍 STEP 0 · The Verification Bottleneck</text>
  <text x="480" y="76" text-anchor="middle" font-size="15" fill="#94a3b8">WHAT breaks · WHY it's slow · HOW 85% of checks need no round trip</text>

  <!-- Coordinator (top) -->
  <rect x="370" y="110" width="220" height="64" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="480" y="140" text-anchor="middle" font-size="16" fill="#e2e8f0">🎯 Coordinator</text>
  <text x="480" y="160" text-anchor="middle" font-size="12" fill="#94a3b8">re-renders context each hand-off</text>

  <!-- Web search agent -->
  <rect x="700" y="110" width="210" height="64" rx="14" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="805" y="140" text-anchor="middle" font-size="16" fill="#e0e7ff">🌐 Web Search Agent</text>
  <text x="805" y="160" text-anchor="middle" font-size="12" fill="#c7d2fe">heavy · exploratory</text>

  <!-- Synthesis agent -->
  <rect x="60" y="300" width="260" height="84" rx="14" fill="#332b16" stroke="#f59e0b" stroke-width="2"/>
  <text x="190" y="334" text-anchor="middle" font-size="17" font-weight="700" fill="#fde68a">🧠 Synthesis Agent</text>
  <text x="190" y="358" text-anchor="middle" font-size="12" fill="#fcd34d">needs to verify a claim…</text>
  <text x="190" y="374" text-anchor="middle" font-size="12" fill="#fcd34d">“When was TCP/IP adopted?”</text>

  <!-- Bounce arrows (naive) -->
  <path d="M320,330 C 420,330 430,170 370,150" fill="none" stroke="#f87171" stroke-width="3" marker-end="url(#ar-red)"/>
  <path d="M590,142 C 650,142 670,142 700,142" fill="none" stroke="#f87171" stroke-width="3" marker-end="url(#ar-red)"/>
  <path d="M700,168 C 640,168 620,200 600,200 C 560,260 380,360 320,360" fill="none" stroke="#f87171" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#ar-red)"/>

  <!-- Cost badges -->
  <g font-size="13" fill="#fecaca">
    <rect x="360" y="232" width="150" height="30" rx="8" fill="url(#redg)" stroke="#f87171"/>
    <text x="435" y="252" text-anchor="middle">↩️ +1 round trip</text>
    <rect x="360" y="268" width="150" height="30" rx="8" fill="url(#redg)" stroke="#f87171"/>
    <text x="435" y="288" text-anchor="middle">+1 900 input tokens</text>
  </g>

  <!-- The 85 / 15 split panel -->
  <rect x="60" y="430" width="840" height="130" rx="16" fill="#0b1220" stroke="#334155" stroke-width="1.5"/>
  <text x="480" y="460" text-anchor="middle" font-size="16" font-weight="700" fill="#38bdf8">💡 The Insight — 85% of checks are trivial</text>

  <rect x="90" y="478" width="430" height="62" rx="12" fill="#0c2a23" stroke="#34d399" stroke-width="2"/>
  <text x="305" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#6ee7b7">85% · dates · names · statistics</text>
  <text x="305" y="525" text-anchor="middle" font-size="13" fill="#a7f3d0">→ a scoped lookup is enough</text>

  <rect x="540" y="478" width="330" height="62" rx="12" fill="#2a1a12" stroke="#f59e0b" stroke-width="2"/>
  <text x="705" y="503" text-anchor="middle" font-size="15" font-weight="700" fill="#fcd34d">15% · deep investigation</text>
  <text x="705" y="525" text-anchor="middle" font-size="13" fill="#fde68a">→ still needs real exploration</text>

  <text x="190" y="396" text-anchor="middle" font-size="11" fill="#f87171">❌ bounces ALL the way up, every time</text>
</svg>
